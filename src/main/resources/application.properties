spring.application.name=sls
# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sls_db
spring.datasource.username=postgres
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# JWT
jwt.secret=replace-this-with-a-very-long-random-dev-secret-key-32bytes-min
jwt.expiration=86400000

# Frontend origin for CORS
app.cors.allowed-origins=http://localhost:4200

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.project.sls=INFO

# Automated backups (JSON snapshots)
app.backup.enabled=true
app.backup.directory=./backups
app.backup.cron=0 0 */6 * * *
